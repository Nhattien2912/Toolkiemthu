<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f6fb;
        }

        .container {
            width: 360px;
            margin: 80px auto;
            padding: 24px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            color: #1f2937;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 16px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

        #message {
            margin-top: 16px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            color: #15803d;
        }

        .error {
            color: #dc2626;
        }

        .hint {
            margin-top: 16px;
            font-size: 14px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login Demo</h1>

        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Nhap username">

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Nhap password">

        <button id="login-button" type="button" onclick="login()">Login</button>

        <p id="message"></p>
        <p class="hint">Tai khoan dung: student / Password123</p>
    </div>

    <script>
        function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const message = document.getElementById("message");

            if (username === "student" && password === "Password123") {
                message.textContent = "Login successful!";
                message.className = "success";
            } else {
                message.textContent = "Invalid username or password.";
                message.className = "error";
            }
        }
    </script>
</body>
</html>
